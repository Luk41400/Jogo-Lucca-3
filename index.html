<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Own the Road | F1 Road Safety Challenge</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Main Menu -->
        <main id="main-menu" class="screen">
            <div class="glass-container">
                <h1 class="glow-text">OWN THE ROAD</h1>
                <p class="subtitle">Desafio F1 de Segurança Viária</p>
                <div class="stats-bar">
                    <div class="stat"><span class="label">Dinheiro:</span> <span id="player-money">$0</span></div>
                    <div class="stat"><span class="label">Carro Atual:</span> <span id="current-car">Fusca</span></div>
                </div>
                <div class="menu-actions">
                    <button id="start-btn" class="primary-btn">INICIAR CORRIDA</button>
                    <button id="garage-btn" class="secondary-btn">GARAGEM</button>
                </div>
            </div>
        </main>

        <!-- Garage Screen -->
        <section id="garage-screen" class="screen hidden">
            <div class="top-nav">
                <button class="back-btn">&larr; Voltar</button>
                <div class="money-display">$0</div>
            </div>
            <div class="garage-content">
                <h2 class="title">Sua Coleção</h2>
                <div id="car-list" class="car-grid"></div>
            </div>
        </section>

        <!-- Game Screen -->
        <section id="game-screen" class="screen hidden">
            <div class="game-hud">
                <div class="hud-top">
                    <div class="hud-item">
                        <span class="label">DURABILIDADE</span>
                        <div class="progress-container">
                            <div id="durability-bar" class="progress-bar green"></div>
                        </div>
                    </div>
                    <div id="speed-display" class="hud-item">0 KM/H</div>
                </div>
                
                <div class="mini-map-container">
                    <div class="progress-track">
                        <div id="player-marker" class="marker"></div>
                        <div class="finish-line-marker">🏁</div>
                    </div>
                </div>
            </div>

            <canvas id="game-canvas"></canvas>

            <!-- Question Overlay -->
             <div id="question-overlay" class="hidden">
                <div id="traffic-light-container">
                    <div class="light red active"></div>
                    <div class="light yellow"></div>
                    <div class="light green"></div>
                </div>
                <div class="question-card glass">
                    <div class="timer-container">
                        <div id="timer-bar" class="timer-fill"></div>
                        <span id="timer-text">15</span>
                    </div>
                    <h3 id="question-text">Pode dirigir falando ao celular?</h3>
                    <div id="options-container"></div>
                </div>
             </div>
        </section>

        <!-- Result Screen -->
        <section id="result-screen" class="screen hidden">
            <div class="glass-container">
                <h2 id="result-title">CHEGADA!</h2>
                <div class="result-stats">
                    <div class="result-item"><span class="label">Recompensa:</span> <span class="value">$500</span></div>
                    <div class="result-item"><span class="label">Bônus de Durabilidade:</span> <span id="durability-bonus" class="value">$0</span></div>
                </div>
                <button id="return-menu-btn" class="primary-btn">VOLTAR AO MENU</button>
            </div>
        </section>
    </div>

    <script src="questions.js"></script>
    <script src="cars.js"></script>
    <script src="game.js"></script>
</body>
</html>
